<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Login - Society Maintenance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0b1329 0%, #0f172a 100%) !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1f5f9;
        }
        .login-card {
            background: #0f172a !important;
            border: 1px solid #1e293b !important;
            border-radius: 16px !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4) !important;
            width: 420px;
            padding: 40px;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%) !important;
            color: white !important;
            border: none !important;
            border-radius: 10px !important;
            font-weight: 600 !important;
            padding: 12px;
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%) !important;
        }
        .form-control {
            background-color: #0b1329 !important;
            border: 1px solid #1e293b !important;
            color: #ffffff !important;
            padding: 12px;
            border-radius: 8px;
        }
        .form-control:focus {
            border-color: #3b82f6 !important;
            box-shadow: none !important;
            color: #ffffff !important;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <h3 class="fw-bold mb-2">🏢 Resident Portal</h3>
        <p class="text-muted small mb-4">Sign in to manage and track your society complaints</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label small fw-semibold text-secondary">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label small fw-semibold text-secondary">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn btn-gradient w-100 shadow-sm mb-3">Sign In</button>
        </form>

        <!-- Tester ke bypass ke liye link -->
        <div class="border-top border-secondary opacity-25 my-3"></div>
        <a href="/admin/" class="text-info small text-decoration-none fw-semibold">🛠️ Switch to Admin Operations Panel</a>
    </div>

</body>
</html>
