<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Sign-In - Society Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #090d16 !important;
            color: #ffffff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: #111827 !important;
            border: 1px solid #1f2937 !important;
            border-radius: 14px !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5) !important;
            width: 420px;
            padding: 40px;
        }
        .btn-emerald {
            background: #10b981 !important;
            color: #090d16 !important;
            border: none !important;
            border-radius: 8px !important;
            font-weight: 700 !important;
            padding: 12px;
            transition: all 0.2s ease;
        }
        .btn-emerald:hover {
            background: #059669 !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        .form-control {
            background-color: #1f2937 !important;
            border: 1px solid #374151 !important;
            color: #ffffff !important;
            padding: 12px;
            border-radius: 8px;
        }
        .form-control:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.2) !important;
            background-color: #1f2937 !important;
        }
        .text-emerald { color: #10b981 !important; }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <h3 class="fw-bold mb-2">🏢 Society<span class="text-emerald">Care</span></h3>
        <p class="text-muted small mb-4" style="color: #9ca3af !important;">Central Security & Management Terminal</p>
        
        {% if form.errors %}
            <div class="alert alert-danger bg-opacity-10 text-danger border-danger small py-2">
                ⚠️ Invalid Access Credentials!
            </div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label small fw-semibold">Operator Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label small fw-semibold">Secure Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn btn-emerald w-100 mb-3">Authorize Session</button>
        </form>

        <p class="small mb-2" style="color: #9ca3af !important;">New asset link? <a href="/register/" class="text-emerald text-decoration-none fw-bold">Register Asset</a></p>
        <div class="border-top border-secondary opacity-10 my-3"></div>
        <a href="/admin/" class="small text-decoration-none fw-semibold" style="color: #f59e0b !important;">🛠️ Admin Subsystem Matrix</a>
    </div>

</body>
</html>
