<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Registration - Society Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #090d16 !important;
            color: #ffffff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background-color: #111827 !important;
            border: 1px solid #1f2937 !important;
            border-radius: 14px !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5) !important;
            width: 420px;
            padding: 40px;
        }
        .btn-emerald {
            background: #10b981 !important;
            color: #090d16 !important;
            border: none !important;
            border-radius: 8px !important;
            font-weight: 700 !important;
            padding: 12px;
            transition: all 0.2s ease;
        }
        .btn-emerald:hover {
            background: #059669 !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        .form-control {
            background-color: #1f2937 !important;
            border: 1px solid #374151 !important;
            color: #ffffff !important;
            padding: 12px;
            border-radius: 8px;
        }
        .form-control:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.2) !important;
            background-color: #1f2937 !important;
        }
        .text-emerald { color: #10b981 !important; }
    </style>
</head>
<body>

    <div class="register-card text-center">
        <h3 class="fw-bold mb-2">📝 Register Asset</h3>
        <p class="text-muted small mb-4" style="color: #9ca3af !important;">Initialize new account system node</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label small fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Create username" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label small fw-semibold">Email Stream</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email address" required>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label small fw-semibold">Access Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create robust password" required>
            </div>
            
            <button type="submit" class="btn btn-emerald w-100 mb-3">Initialize Registration</button>
        </form>

        <div class="border-top border-secondary opacity-10 my-3"></div>
        <p class="small mb-0" style="color: #9ca3af !important;">Existing node account? <a href="{% url 'login' %}" class="text-emerald text-decoration-none fw-bold">Sign In</a></p>
    </div>

</body>
</html>
